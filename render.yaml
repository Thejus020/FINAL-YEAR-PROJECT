services:
  # ----------------------------------------
  # 1. Backend API (Node.js/Express)
  # ----------------------------------------
  - type: web
    name: infraflow-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # You will paste your MongoDB URI in the Render Dashboard
      - key: GITHUB_CLIENT_ID
        sync: false # Paste from your GitHub OAuth App
      - key: GITHUB_CLIENT_SECRET
        sync: false # Paste from your GitHub OAuth App
      - key: JWT_SECRET
        sync: false # A random secret string
      - key: SERVER_URL
        value: https://infraflow-server.onrender.com # Change this if your assigned URL is different
      - key: CLIENT_URL
        value: https://infraflow-client.onrender.com # Change this if your assigned URL is different
      - key: ALLOWED_ORIGINS
        value: https://infraflow-client.onrender.com
      - key: GITHUB_CALLBACK_URL
        value: https://infraflow-server.onrender.com/auth/github/callback
      - key: LOCAL_DEPLOY_ENABLED
        value: false # PM2 does not work across Render instances for deploying user apps

  # ----------------------------------------
  # 2. Frontend App (React/Vite)
  # ----------------------------------------
  - type: web
    name: infraflow-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://infraflow-server.onrender.com
      - key: VITE_WEBHOOK_BASE_URL
        value: https://infraflow-server.onrender.com
